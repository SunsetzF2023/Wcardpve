<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人卡牌对战</title>
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/simple-card.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a202c, #2d3748);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .game-header h1 {
            color: #f7fafc;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            color: #a0aec0;
        }
        
        .player-area {
            background: rgba(45, 55, 72, 0.3);
            border: 2px solid #4a5568;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .player-name {
            color: #f7fafc;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .health-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .health-bar {
            width: 200px;
            height: 24px;
            background: #2d3748;
            border: 2px solid #4a5568;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #38a169, #48bb78);
            transition: width 0.3s ease;
        }
        
        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f7fafc;
            font-weight: bold;
            font-size: 12px;
        }
        
        .cards-area {
            display: flex;
            gap: 15px;
            min-height: 200px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px;
            background: rgba(26, 32, 44, 0.2);
            border-radius: 8px;
            border: 1px solid #4a5568;
        }
        
        .field-cards {
            display: flex;
            gap: 10px;
            min-height: 120px;
            padding: 10px;
            background: rgba(45, 55, 72, 0.3);
            border-radius: 8px;
            border: 1px solid #4a5568;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .game-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3182ce, #2c5282);
            color: #f7fafc;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #4299e1, #3182ce);
        }
        
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .game-log {
            background: rgba(26, 32, 44, 0.3);
            border: 1px solid #4a5568;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .game-log h3 {
            color: #f7fafc;
            margin-bottom: 10px;
        }
        
        .log-entry {
            color: #a0aec0;
            padding: 5px;
            margin-bottom: 5px;
            border-left: 3px solid #4a5568;
            background: rgba(45, 55, 72, 0.2);
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .log-entry.player {
            border-left-color: #48bb78;
        }
        
        .log-entry.ai {
            border-left-color: #e53e3e;
        }
        
        .log-entry.system {
            border-left-color: #3182ce;
        }
        
        .vs-indicator {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #f6e05e;
            margin: 20px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 32, 44, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #2d3748;
            border: 2px solid #4a5568;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        
        .modal-content h2 {
            color: #f7fafc;
            margin-bottom: 15px;
        }
        
        .modal-content p {
            color: #a0aec0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🎴 火柴人卡牌对战 🎴</h1>
            <div class="game-info">
                <span id="turn-indicator">你的回合</span>
                <span id="round-count">第1回合</span>
            </div>
        </header>

        <section class="player-area">
            <div class="player-header">
                <div class="player-name">🤖 AI对手</div>
                <div class="health-info">
                    <div class="health-bar">
                        <div class="health-fill" id="ai-health" style="width: 100%"></div>
                        <div class="health-text">HP: <span id="ai-hp">300</span>/300</div>
                    </div>
                </div>
            </div>
            <div class="field-cards" id="ai-field">
                <div style="color: #718096; text-align: center; padding: 20px;">AI战场</div>
            </div>
            <div class="cards-area" id="ai-hand">
                <div style="color: #718096; text-align: center; padding: 20px;">AI手牌</div>
            </div>
        </section>

        <div class="vs-indicator">VS</div>

        <section class="player-area">
            <div class="player-header">
                <div class="player-name">👤 玩家</div>
                <div class="health-info">
                    <div class="health-bar">
                        <div class="health-fill" id="player-health" style="width: 100%"></div>
                        <div class="health-text">HP: <span id="player-hp">300</span>/300</div>
                    </div>
                </div>
            </div>
            <div class="cards-area" id="player-hand">
                <div style="color: #718096; text-align: center; padding: 20px;">你的手牌</div>
            </div>
            <div class="field-cards" id="player-field">
                <div style="color: #718096; text-align: center; padding: 20px;">你的战场</div>
            </div>
        </section>

        <div class="controls">
            <button id="draw-card-btn" class="game-btn">抽牌</button>
            <button id="end-turn-btn" class="game-btn">结束回合</button>
            <button id="restart-btn" class="game-btn">重新开始</button>
        </div>

        <div class="game-log">
            <h3>战斗日志</h3>
            <div id="log-content"></div>
        </div>
    </div>

    <div id="game-over-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="game-over-title">游戏结束</h2>
            <p id="game-over-message">游戏结束</p>
            <button id="restart-modal-btn" class="game-btn">重新开始</button>
        </div>
    </div>

    <script type="module">
        import { SimpleCard } from './src/components/SimpleCard.js';
        import { SimpleGameEngine } from './src/services/SimpleGameEngine.js';
        import { SimpleCardManager } from './src/services/SimpleCardManager.js';
        import { SimpleAIService } from './src/services/SimpleAIService.js';

        class SimpleCardManager {
            constructor() {
                this.cards = [];
            }

            async loadCards() {
                try {
                    const response = await fetch('./src/data/simple-cards.json');
                    const data = await response.json();
                    this.cards = data.cards || [];
                    console.log(`Loaded ${this.cards.length} cards`);
                    return this.cards;
                } catch (error) {
                    console.error('Failed to load card data:', error);
                    return [];
                }
            }

            getCard(id) {
                return this.cards.find(card => card.id === id);
            }
        }

        class SimpleAIService {
            async makeSimpleDecisions(ai, player) {
                const decisions = [];
                
                // 简单AI策略
                const playableCards = ai.hand.filter((card, index) => {
                    return ai.field.length < ai.maxFieldSize;
                });

                if (playableCards.length > 0 && Math.random() > 0.3) {
                    // 随机选择一张牌
                    const randomCard = playableCards[Math.floor(Math.random() * playableCards.length)];
                    const cardIndex = ai.hand.indexOf(randomCard);
                    decisions.push({
                        type: 'playCard',
                        cardIndex
                    });
                }

                // 可能抽牌
                if (Math.random() > 0.5 && ai.deck.length > 0) {
                    decisions.push({
                        type: 'drawCard'
                    });
                }

                // 结束回合
                decisions.push({
                    type: 'endTurn'
                });

                return decisions;
            }
        }

        class SimpleGameApp {
            constructor() {
                this.gameEngine = new SimpleGameEngine();
                this.cardManager = new SimpleCardManager();
                this.aiService = new SimpleAIService();
                this.isInitialized = false;
            }

            async init() {
                try {
                    await this.cardManager.loadCards();
                    this.gameEngine.initialize(this.cardManager, this.aiService);
                    this.setupEventListeners();
                    this.updateDisplay();
                    this.isInitialized = true;
                } catch (error) {
                    console.error('Failed to initialize game:', error);
                }
            }

            setupEventListeners() {
                // 游戏事件
                this.gameEngine.on('gameStart', (data) => {
                    this.addLog('游戏开始！', 'system');
                });

                this.gameEngine.on('cardDrawn', (data) => {
                    this.addLog(`${data.player.name} 抽了一张牌`, data.player.id === 'player' ? 'player' : 'ai');
                    this.updateDisplay();
                });

                this.gameEngine.on('cardPlayed', (data) => {
                    this.addLog(`${data.player.name} 打出了 ${data.card.type} 牌`, data.player.id === 'player' ? 'player' : 'ai');
                    this.updateDisplay();
                });

                this.gameEngine.on('damageDealt', (data) => {
                    this.addLog(`${data.attacker.name} 对 ${data.target.name} 造成了 ${data.damage} 点伤害${data.blocked > 0 ? `（${data.blocked}点被格挡）` : ''}`, data.attacker.id === 'player' ? 'player' : 'ai');
                });

                this.gameEngine.on('shieldApplied', (data) => {
                    this.addLog(`${data.player.name} 获得了 ${data.amount} 点护甲`, data.player.id === 'player' ? 'player' : 'ai');
                });

                this.gameEngine.on('healingApplied', (data) => {
                    this.addLog(`${data.player.name} 恢复了 ${data.amount} 点生命值`, data.player.id === 'player' ? 'player' : 'ai');
                });

                this.gameEngine.on('suitBonus', (data) => {
                    this.addLog(`${data.player.name} 触发连携：${data.bonus}`, data.player.id === 'player' ? 'player' : 'ai');
                });

                this.gameEngine.on('criticalHit', (data) => {
                    this.addLog(`💥 暴击！${data.attacker.name} 对 ${data.target.name} 造成了 ${data.damage} 点伤害！`, data.attacker.id === 'player' ? 'player' : 'ai');
                });

                this.gameEngine.on('turnStart', (data) => {
                    this.addLog(`${data.player.name} 的回合开始`, 'system');
                    this.updateDisplay();
                });

                this.gameEngine.on('turnEnd', (data) => {
                    this.addLog(`${data.player.name} 的回合结束`, 'system');
                    this.updateDisplay();
                });

                this.gameEngine.on('gameOver', (data) => {
                    this.addLog(`游戏结束！${data.winner.name} 获胜！`, 'system');
                    this.showGameOver(data.winner);
                });

                // UI事件
                document.getElementById('draw-card-btn').addEventListener('click', () => {
                    this.gameEngine.drawCard(this.gameEngine.state[this.gameEngine.state.currentPlayer]);
                });

                document.getElementById('end-turn-btn').addEventListener('click', () => {
                    this.gameEngine.endTurn();
                });

                document.getElementById('restart-btn').addEventListener('click', () => {
                    this.gameEngine.restart();
                    this.hideGameOver();
                });

                document.getElementById('restart-modal-btn').addEventListener('click', () => {
                    this.gameEngine.restart();
                    this.hideGameOver();
                });

                // 键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'd' || e.key === 'D') {
                        this.gameEngine.drawCard(this.gameEngine.state[this.gameEngine.state.currentPlayer]);
                    } else if (e.key === ' ') {
                        e.preventDefault();
                        this.gameEngine.endTurn();
                    } else if (e.key === 'r' || e.key === 'R') {
                        this.gameEngine.restart();
                        this.hideGameOver();
                    }
                });
            }

            updateDisplay() {
                const state = this.gameEngine.getGameState();
                
                // 更新回合信息
                document.getElementById('turn-indicator').textContent = state.currentPlayer === 'player' ? '你的回合' : 'AI回合';
                document.getElementById('round-count').textContent = `第${state.round}回合`;
                
                // 更新血量
                document.getElementById('player-hp').textContent = state.player.health;
                document.getElementById('ai-hp').textContent = state.ai.health;
                
                const playerHealthPercent = (state.player.health / state.player.maxHealth) * 100;
                const aiHealthPercent = (state.ai.health / state.ai.maxHealth) * 100;
                
                document.getElementById('player-health').style.width = `${playerHealthPercent}%`;
                document.getElementById('ai-health').style.width = `${aiHealthPercent}%`;
                
                // 更新手牌
                this.updateHand('player-hand', state.player.hand);
                this.updateHand('ai-hand', state.ai.hand);
                
                // 更新战场
                this.updateField('player-field', state.player.field);
                this.updateField('ai-field', state.ai.field);
                
                // 更新按钮状态
                const isPlayerTurn = state.currentPlayer === 'player';
                document.getElementById('draw-card-btn').disabled = !isPlayerTurn;
                document.getElementById('end-turn-btn').disabled = !isPlayerTurn;
            }

            updateHand(containerId, cards) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                
                if (cards.length === 0) {
                    container.innerHTML = '<div style="color: #718096; text-align: center; padding: 20px;">无牌</div>';
                    return;
                }
                
                cards.forEach((card, index) => {
                    const cardElement = new SimpleCard(card).createElement();
                    cardElement.addEventListener('click', () => {
                        if (this.gameEngine.state.currentPlayer === 'player') {
                            this.gameEngine.playCard(this.gameEngine.state.player, index);
                        }
                    });
                    container.appendChild(cardElement);
                });
            }

            updateField(containerId, cards) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                
                if (cards.length === 0) {
                    container.innerHTML = '<div style="color: #718096; text-align: center; padding: 20px;">空</div>';
                    return;
                }
                
                cards.forEach((card) => {
                    const cardElement = new SimpleCard(card).createElement();
                    cardElement.classList.add('on-field');
                    container.appendChild(cardElement);
                });
            }

            addLog(message, type = 'system') {
                const logContent = document.getElementById('log-content');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${type}`;
                logEntry.textContent = message;
                logContent.appendChild(logEntry);
                logContent.scrollTop = logContent.scrollHeight;
                
                // 限制日志条数
                while (logContent.children.length > 50) {
                    logContent.removeChild(logContent.firstChild);
                }
            }

            showGameOver(winner) {
                const modal = document.getElementById('game-over-modal');
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');
                
                title.textContent = winner.id === 'player' ? '🎉 胜利！' : '😔 失败';
                message.textContent = winner.id === 'player' ? '恭喜你击败了AI对手！' : 'AI获得了胜利，再接再厉！';
                
                modal.style.display = 'flex';
            }

            hideGameOver() {
                document.getElementById('game-over-modal').style.display = 'none';
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', async () => {
            const app = new SimpleGameApp();
            await app.init();
            window.gameApp = app;
        });
    </script>
</body>
</html>

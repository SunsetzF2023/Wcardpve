<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌塔防 - 杀戮尖塔风格</title>
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/tower-defense.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a202c, #2d3748);
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .game-header {
            background: rgba(26, 32, 44, 0.9);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4a5568;
            z-index: 100;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            color: #f7fafc;
            font-size: 1rem;
        }
        
        .game-info span {
            background: rgba(45, 55, 72, 0.8);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #4a5568;
        }
        
        .game-board {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(45deg, #2d3748 25%, #1a202c 25%, #1a202c 50%, #2d3748 50%, #2d3748 75%, #1a202c 75%);
            background-size: 40px 40px;
        }
        
        .game-path {
            position: absolute;
            background: rgba(74, 85, 104, 0.3);
            border: 2px solid #4a5568;
            border-radius: 10px;
        }
        
        .tower-slot {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(45, 55, 72, 0.6);
            border: 2px solid #4a5568;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tower-slot:hover {
            background: rgba(72, 187, 120, 0.3);
            border-color: #48bb78;
            transform: scale(1.1);
        }
        
        .tower-slot.occupied {
            background: rgba(72, 187, 120, 0.5);
            border-color: #48bb78;
        }
        
        .enemy {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #fc8181, #e53e3e);
            border-radius: 50%;
            border: 2px solid #c53030;
            transition: all 0.1s linear;
            z-index: 10;
        }
        
        .enemy.boss {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f6ad55, #d69e2e);
            border-color: #b7791f;
        }
        
        .projectile {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #63b3ed, #3182ce);
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 10px rgba(99, 179, 237, 0.8);
        }
        
        .damage-text {
            position: absolute;
            color: #fc8181;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 30;
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
        }
        
        .card-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 32, 44, 0.95);
            border-top: 2px solid #4a5568;
            padding: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
        }
        
        .tower-card {
            width: 80px;
            height: 120px;
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 2px solid #4a5568;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tower-card:hover {
            transform: translateY(-10px);
            border-color: #63b3ed;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .tower-card.selected {
            border-color: #48bb78;
            box-shadow: 0 0 20px rgba(72, 187, 120, 0.5);
        }
        
        .tower-card .card-type {
            font-size: 24px;
            font-weight: bold;
            color: #f7fafc;
            margin-bottom: 5px;
        }
        
        .tower-card .card-cost {
            background: rgba(72, 187, 120, 0.8);
            color: #f7fafc;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .wave-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.9);
            color: #f7fafc;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 90;
            animation: wavePulse 2s ease-in-out infinite;
        }
        
        .resource-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(26, 32, 44, 0.9);
            border: 2px solid #4a5568;
            border-radius: 8px;
            padding: 15px;
            color: #f7fafc;
            z-index: 90;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .resource-icon {
            width: 24px;
            height: 24px;
            background: #f6ad55;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        @keyframes damageFloat {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }
        
        @keyframes wavePulse {
            0%, 100% {
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(1.05);
            }
        }
        
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 32, 44, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #2d3748;
            border: 2px solid #4a5568;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: #f7fafc;
        }
        
        .modal-content h2 {
            margin-bottom: 15px;
            color: #f6ad55;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #f7fafc;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="game-info">
                <span>生命值: <span id="health">100</span></span>
                <span>波次: <span id="wave">1</span>/10</span>
                <span>金币: <span id="gold">200</span></span>
                <span>得分: <span id="score">0</span></span>
            </div>
        </header>

        <div class="wave-indicator" id="wave-indicator">第 1 波准备中...</div>
        
        <div class="resource-panel">
            <div class="resource-item">
                <div class="resource-icon">💰</div>
                <span id="gold-display">200</span>
            </div>
            <div class="resource-item">
                <div class="resource-icon">❤️</div>
                <span id="health-display">100</span>
            </div>
        </div>

        <main class="game-board" id="game-board">
            <!-- 游戏路径 -->
            <div class="game-path" id="game-path"></div>
            
            <!-- 塔位将通过JavaScript动态生成 -->
        </main>

        <div class="card-panel" id="card-panel">
            <!-- 卡牌将通过JavaScript动态生成 -->
        </div>
    </div>

    <div class="game-over-modal" id="game-over-modal">
        <div class="modal-content">
            <h2 id="game-over-title">游戏结束</h2>
            <p id="game-over-message">再接再厉！</p>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script type="module">
        import { SimpleCard } from './src/components/SimpleCard.js';
        import { TowerDefenseEngine } from './src/services/TowerDefenseEngine.js';
        import { TowerCardManager } from './src/services/TowerCardManager.js';

        class TowerDefenseGame {
            constructor() {
                this.engine = new TowerDefenseEngine();
                this.cardManager = new TowerCardManager();
                this.selectedCard = null;
                this.isInitialized = false;
            }

            async init() {
                try {
                    await this.cardManager.loadCards();
                    this.engine.initialize(this.cardManager);
                    this.setupGameBoard();
                    this.setupCardPanel();
                    this.setupEventListeners();
                    this.startGame();
                    this.isInitialized = true;
                } catch (error) {
                    console.error('Failed to initialize tower defense game:', error);
                }
            }

            setupGameBoard() {
                const gameBoard = document.getElementById('game-board');
                const boardRect = gameBoard.getBoundingClientRect();
                
                // 创建塔位
                this.createTowerSlots(gameBoard, boardRect);
                
                // 创建路径
                this.createPath(gameBoard, boardRect);
            }

            createTowerSlots(board, rect) {
                const slots = [
                    { x: 150, y: 100 }, { x: 300, y: 100 }, { x: 450, y: 100 },
                    { x: 150, y: 200 }, { x: 300, y: 200 }, { x: 450, y: 200 },
                    { x: 150, y: 300 }, { x: 300, y: 300 }, { x: 450, y: 300 },
                    { x: 225, y: 150 }, { x: 375, y: 150 }, { x: 225, y: 250 }, { x: 375, y: 250 }
                ];

                slots.forEach((slot, index) => {
                    const slotElement = document.createElement('div');
                    slotElement.className = 'tower-slot';
                    slotElement.id = `slot-${index}`;
                    slotElement.style.left = `${slot.x}px`;
                    slotElement.style.top = `${slot.y}px`;
                    slotElement.addEventListener('click', () => this.onSlotClick(index));
                    board.appendChild(slotElement);
                });
            }

            createPath(board, rect) {
                const path = document.getElementById('game-path');
                const pathPoints = [
                    { x: 0, y: 150, width: 100, height: 40 },
                    { x: 100, y: 150, width: 40, height: 100 },
                    { x: 100, y: 250, width: 100, height: 40 },
                    { x: 200, y: 250, width: 40, height: 100 },
                    { x: 200, y: 350, width: 100, height: 40 },
                    { x: 300, y: 350, width: 40, height: -100 },
                    { x: 300, y: 250, width: 100, height: 40 },
                    { x: 400, y: 250, width: 40, height: -100 },
                    { x: 400, y: 150, width: 100, height: 40 },
                    { x: 500, y: 150, width: 40, height: 100 },
                    { x: 500, y: 250, width: 100, height: 40 },
                    { x: 600, y: 250, width: 40, height: -100 },
                    { x: 600, y: 150, width: rect.width - 600, height: 40 }
                ];

                pathPoints.forEach(point => {
                    const segment = document.createElement('div');
                    segment.style.position = 'absolute';
                    segment.style.left = `${point.x}px`;
                    segment.style.top = `${point.y}px`;
                    segment.style.width = `${point.width}px`;
                    segment.style.height = `${point.height}px`;
                    segment.style.background = 'rgba(74, 85, 104, 0.3)';
                    segment.style.border = '2px solid #4a5568';
                    if (point.height < 0) {
                        segment.style.top = `${point.y + point.height}px`;
                        segment.style.height = `${Math.abs(point.height)}px`;
                    }
                    path.appendChild(segment);
                });
            }

            setupCardPanel() {
                const cardPanel = document.getElementById('card-panel');
                const availableCards = this.cardManager.getAvailableCards();
                
                availableCards.forEach(card => {
                    const cardElement = this.createTowerCard(card);
                    cardPanel.appendChild(cardElement);
                });
            }

            createTowerCard(card) {
                const cardElement = document.createElement('div');
                cardElement.className = 'tower-card';
                cardElement.dataset.cardId = card.id;
                
                cardElement.innerHTML = `
                    <div class="card-type">${card.type}</div>
                    <div class="card-cost">💰 ${card.cost}</div>
                `;
                
                cardElement.addEventListener('click', () => this.onCardClick(card));
                return cardElement;
            }

            onCardClick(card) {
                // 取消之前的选择
                document.querySelectorAll('.tower-card').forEach(el => el.classList.remove('selected'));
                
                if (this.selectedCard === card) {
                    this.selectedCard = null;
                } else {
                    this.selectedCard = card;
                    event.target.closest('.tower-card').classList.add('selected');
                }
            }

            onSlotClick(slotIndex) {
                if (!this.selectedCard) return;
                
                const slot = document.getElementById(`slot-${slotIndex}`);
                if (slot.classList.contains('occupied')) return;
                
                const gameState = this.engine.getGameState();
                if (gameState.gold < this.selectedCard.cost) {
                    this.showMessage('金币不足！');
                    return;
                }
                
                // 放置塔
                this.engine.placeTower(slotIndex, this.selectedCard);
                slot.classList.add('occupied');
                
                // 更新UI
                this.updateResourceDisplay();
                this.selectedCard = null;
                document.querySelectorAll('.tower-card').forEach(el => el.classList.remove('selected'));
            }

            setupEventListeners() {
                this.engine.on('enemySpawned', (data) => {
                    this.spawnEnemy(data.enemy);
                });

                this.engine.on('towerPlaced', (data) => {
                    this.updateTowerSlot(data.slotIndex, data.card);
                });

                this.engine.on('damageDealt', (data) => {
                    this.showDamage(data.x, data.y, data.damage);
                });

                this.engine.on('enemyKilled', (data) => {
                    this.removeEnemy(data.enemyId);
                    this.updateResourceDisplay();
                });

                this.engine.on('waveStarted', (data) => {
                    this.updateWaveIndicator(data.wave);
                });

                this.engine.on('gameOver', (data) => {
                    this.showGameOver(data.victory);
                });

                this.engine.on('resourceUpdated', (data) => {
                    this.updateResourceDisplay();
                });
            }

            spawnEnemy(enemy) {
                const gameBoard = document.getElementById('game-board');
                const enemyElement = document.createElement('div');
                enemyElement.className = enemy.isBoss ? 'enemy boss' : 'enemy';
                enemyElement.id = `enemy-${enemy.id}`;
                enemyElement.style.left = `${enemy.x}px`;
                enemyElement.style.top = `${enemy.y}px`;
                gameBoard.appendChild(enemyElement);
            }

            removeEnemy(enemyId) {
                const enemyElement = document.getElementById(`enemy-${enemyId}`);
                if (enemyElement) {
                    enemyElement.remove();
                }
            }

            updateTowerSlot(slotIndex, card) {
                const slot = document.getElementById(`slot-${slotIndex}`);
                slot.innerHTML = `
                    <div style="color: #f7fafc; font-size: 20px; font-weight: bold;">${card.type}</div>
                    <div style="color: #f6ad55; font-size: 12px;">Lv.1</div>
                `;
            }

            showDamage(x, y, damage) {
                const gameBoard = document.getElementById('game-board');
                const damageElement = document.createElement('div');
                damageElement.className = 'damage-text';
                damageElement.textContent = `-${damage}`;
                damageElement.style.left = `${x}px`;
                damageElement.style.top = `${y}px`;
                gameBoard.appendChild(damageElement);
                
                setTimeout(() => damageElement.remove(), 1000);
            }

            updateWaveIndicator(wave) {
                const indicator = document.getElementById('wave-indicator');
                indicator.textContent = `第 ${wave} 波进行中...`;
                document.getElementById('wave').textContent = wave;
            }

            updateResourceDisplay() {
                const gameState = this.engine.getGameState();
                document.getElementById('health').textContent = gameState.health;
                document.getElementById('gold').textContent = gameState.gold;
                document.getElementById('score').textContent = gameState.score;
                document.getElementById('gold-display').textContent = gameState.gold;
                document.getElementById('health-display').textContent = gameState.health;
            }

            showMessage(message) {
                // 简单的消息显示
                console.log(message);
            }

            showGameOver(victory) {
                const modal = document.getElementById('game-over-modal');
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');
                
                title.textContent = victory ? '🎉 胜利！' : '😔 失败';
                message.textContent = victory ? '恭喜你成功防守了所有波次！' : '敌人突破了防线，再接再厉！';
                
                modal.style.display = 'flex';
            }

            startGame() {
                this.engine.startGame();
                this.updateResourceDisplay();
            }
        }

        // 全局重新开始函数
        window.restartGame = function() {
            location.reload();
        };

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', async () => {
            const game = new TowerDefenseGame();
            await game.init();
            window.towerGame = game;
        });
    </script>
</body>
</html>
